<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Factor</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="../theme.css">
  <script src="../theme.js"></script>
</head>

<body>
    <a href="../" class="nav-home" aria-label="home">
    <svg viewBox="0 0 24 24" width="40" height="40"
         fill="none" stroke="currentColor" stroke-width="3"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </a>

  <div class="layout">
    <div class="panel panel-calc">
      <div class="top">
        <div class="title">Factor</div>
        <div class="tools">
          <button class="btn" id="factorBtn" type="button">Factor</button>
        </div>
      </div>

      <textarea id="n" class="expr" rows="1" spellcheck="false" autocomplete="off"
        placeholder="Enter integer"></textarea>

      <div class="result-row">
        <div id="out" class="result ok">—</div>
        <button class="clip" id="btnCopy" aria-label="copy json" title="Copy JSON" disabled>
          <svg viewBox="0 0 24 24" width="22" height="22"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="./factor.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
