<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Type fit</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="../theme.css">
  <script src="../theme.js"></script>
</head>

<body>
  <a href="/" class="nav-home" aria-label="home">
    <svg viewBox="0 0 24 24" width="40" height="40"
         fill="none" stroke="currentColor" stroke-width="3"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </a>

  <div class="panel">
    <div class="title">
      <span class="title-text">Type fit</span>
      <span id="meta" class="meta"></span>
      <div class="title-btns">
        <button id="refsBtn" class="icon-btn" aria-label="references">i</button>
        <button id="legendBtn" class="icon-btn" aria-label="legend">?</button>
      </div>
    </div>

    <div id="legendBox" class="popover hidden" role="dialog" aria-label="legend">
      <div class="legend">
        <span><b>exact</b> — value preserved</span>
        <span><b>rounding</b> — representable with loss of precision</span>
        <span><b>conversion</b> — defined value change (e.g. unsigned wrap)</span>
        <span><b>implementation-defined</b> — depends on implementation</span>
        <span><b>reject</b> — not representable</span>
      </div>
    </div>

    <div id="refsBox" class="popover hidden" role="dialog" aria-label="references">
      <div id="refs" class="refs"></div>
    </div>

    <input
      id="inp"
      class="inp"
      type="text"
      placeholder="enter number or type name"
      autocomplete="off"
      spellcheck="false"
    >

    <div class="bar">
      <div class="ctl">
        Language
        <select id="lang"></select>
      </div>

      <div class="ctl">
        Target
        <select id="target"></select>
      </div>
    </div>

    <div id="out" class="result"></div>
  </div>

  <script src="./fit.js"></script>
  <script src="./info.js"></script>
  <script>
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");
  </script>
</body>
</html>
