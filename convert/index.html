<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Base Convert</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

  <style>
    :root{
      --bg:#e6e6e6;
      --panel:#f2f2f2;
      --border:#bdbdbd;
      --text:#222;
      --placeholder:#777;
      --focus:#888;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      height:100%;
      background:var(--bg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--text);
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

   /* home arrow */
    .nav-home{
      position:fixed;
      top:12px;
      left:10px;
      color:var(--nav);
      opacity:.3;
    }
    .nav-home:hover{opacity:1;color:var(--nav)}

    /* card */
    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:10px;
      padding:22px 24px;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      width:560px;
      max-width:92%;
    }

    .title{
      display:flex;
      align-items:baseline;
      gap:10px;
      margin:0 0 12px;
      font-size:18px;
      font-weight:500;
    }

    .meta{
      margin-left:auto;
      font-size:13px;
      color:var(--muted);
      white-space:nowrap;
      font-weight:400;
    }

    /* main input */
    .inp{
      width:100%;
      padding:14px 16px;
      font-size:20px;
      border-radius:8px;
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      outline:none;
    }
    .inp::placeholder{color:var(--placeholder)}
    .inp:focus{border-color:var(--focus);background:var(--surface-hover)}

    /* controls */
    .bar{
      margin-top:10px;
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .ctl{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      color:var(--muted);
    }

    .mini{
      width:64px;
      padding:8px 10px;
      font-size:13px;
      border-radius:8px;
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      outline:none;
      text-align:center;
      font-variant-numeric:tabular-nums;
    }
    .mini:focus{border-color:var(--focus);background:var(--surface-hover)}

    select.mini{
      width:96px;
      text-align:left;
    }

    .btnTop{
      margin-left:auto;
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--strong-text);
      border-radius:8px;
      padding:8px 10px;
      font-size:12px;
      cursor:pointer;
      opacity:.85;
      user-select:none;
      white-space:nowrap;
    }
    .btnTop:hover{opacity:1}
    .btnTop:active{transform:translateY(1px)}

    /* result */
    .result{
      margin-top:14px;
      padding:10px 14px;
      border-radius:6px;
      font-size:14px;
      border:1px solid var(--border);
      background:var(--surface-2);
    }
    .result.invalid{background:var(--surface-3);color:var(--nav)}

    .line{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:6px 0;
      border-top:1px solid var(--line);
    }
    .line:first-child{border-top:none;padding-top:0}

    .k{
      width:72px;
      flex:0 0 72px;
      color:var(--subtle-text);
      font-variant-numeric:tabular-nums;
    }

    .v{
      flex:1 1 auto;
      word-break:break-all;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Courier New",monospace;
      font-size:13px;
      color:var(--text);
    }

    .btn{
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--strong-text);
      border-radius:8px;
      padding:6px 10px;
      font-size:12px;
      cursor:pointer;
      opacity:.85;
      user-select:none;
      white-space:nowrap;
    }
    .btn:hover{opacity:1}
    .btn:active{transform:translateY(1px)}

    /* ---------- mobile ---------- */
    @media (max-width:700px){
      body{
        justify-content:flex-start;
      }

      .panel{
        margin-top:8px;
      }

      input, select, button{
        font-size:16px;
        min-height:44px;
      }

      .btnTop{
        margin-left:0;
      }

      .nav-home{
        padding:6px;
      }
    }
  </style>
  <link rel="stylesheet" href="../theme.css">
  <script src="../theme.js"></script>
</head>

<body>
  <a href="/" class="nav-home" aria-label="home">
    <svg viewBox="0 0 24 24" width="40" height="40"
         fill="none" stroke="currentColor" stroke-width="3"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </a>

  <div class="panel">
    <div class="title">
      Base convert
      <span class="meta" id="meta"></span>
    </div>

    <input id="inp" class="inp" type="text" placeholder="number"
           autocomplete="off" spellcheck="false">

    <div class="bar">
      <div class="ctl">In
        <input id="baseIn" class="mini" type="text" inputmode="numeric"
               value="10" autocomplete="off" spellcheck="false">
      </div>

      <div class="ctl">Out
        <input id="baseOut" class="mini" type="text" inputmode="numeric"
               value="2" autocomplete="off" spellcheck="false">
      </div>

      <div class="ctl">Case
        <select id="caseMode" class="mini">
          <option value="lower" selected>lower</option>
          <option value="upper">upper</option>
        </select>
      </div>

      <button id="cPrefixes" class="btnTop" type="button">
        C prefixes
      </button>
    </div>

    <div id="out" class="result"></div>
  </div>

  <script src="./convert.js"></script>
  <script>
    if ("serviceWorker" in navigator)
      navigator.serviceWorker.register("./sw.js");
  </script>
</body>
</html>
